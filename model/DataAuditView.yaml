cube:
  name: DataAuditView
  sql_table: default.data_audit

  segments:
    org:
      sql: org = {vars.org}

  dimensions:
    dt:
      sql: dt
      type: time
      title: 日期

    ts:
      sql: ts
      type: time
      title: 最近时间

    type:
      sql: type
      type: string
      title: 来源

    sensV:
      sql: sens_v
      sql_mask: "concat(substringUTF8(sens_v,1,1),'***',substringUTF8(sens_v,lengthUTF8(sens_v),1))"
      type: string
      title: 隐私值

    sensK:
      sql: sens_k
      type: string
      title: 隐私类型

    channel:
      sql: channel
      type: string
      title: 应用

    org:
      sql: org
      type: string
      title: 组织

    sensCategory:
      sql: dictGetString('default.privacy_dict', 'enabled_standard', sens_k)
      type: string
      title: 数据分类

    sensScore:
      sql: dictGetInt64('default.privacy_dict', 'score', sens_k)
      type: number
      title: 数据级别分数

  measures:
    count:
      sql: sum(count)
      type: number
      title: 访问次数

    uidUniq:
      sql: uniqHLL12Merge(uid_uniq)
      type: number
      title: 关联用户

    ipUniq:
      sql: uniqHLL12Merge(ip_uniq)
      type: number
      title: 关联IP

    lastTs:
      sql: max(ts)
      type: time
      title: 最近发现时间

    traceIds:
      sql: groupArrayLastMerge(20)(trace_ids)
      type: array
      title: 溯源ID
